<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Calculator</title>
    <link rel="stylesheet" href="Trip Calculator.css">

</head>

<body>

    <section id="main">
        <div id="h1">
            <h1>Trip Calculator</h1>
            <p class="subtitle">Calculate your trip costs easily</p>
        </div>
        <div id="amont">
            <div class="input-group">
                <label for="number1" class="data">Bill Amount</label>
                <input type="number" id="number1" placeholder="Enter bill amount">
            </div>
            <div class="input-group">
                <label for="number2" class="data">Tip Amount</label>
                <input type="number" id="number2" placeholder="Enter tip amount">
            </div>
            <button id="cheak">Calculate Total</button>
        </div>
        <div id="total">
            <span class="total-label">Total:</span>
            <span class="total-value">$0.00</span>
        </div>

    </section>
    <script src="Trip Calculator.js"></script>
</body>

</html>
